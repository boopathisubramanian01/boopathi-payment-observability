server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: payment-initiation-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: payment-services
          service: payment-initiation-service
          __path__: /var/log/payment/initiation.log

  - job_name: payment-router
    static_configs:
      - targets:
          - localhost
        labels:
          job: payment-services
          service: payment-router
          __path__: /var/log/payment/router.log

  - job_name: instant-payment-handler
    static_configs:
      - targets:
          - localhost
        labels:
          job: payment-services
          service: instant-payment-handler
          __path__: /var/log/payment/handler.log
