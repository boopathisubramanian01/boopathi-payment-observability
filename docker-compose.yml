services:
  loki:
    image: grafana/loki:2.9.8
    container_name: payment-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: payment-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:  
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /private/tmp:/var/log/payment:ro
      - promtail_positions:/tmp
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: payment-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: yesoreyeram-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/plugins:/var/lib/grafana/plugins:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - ai-observability

  ollama:
    image: ollama/ollama:latest
    container_name: payment-ollama
    entrypoint: ["/bin/sh", "/entrypoint/ollama-entrypoint.sh"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./certs:/certs:ro
      - ./ollama-entrypoint.sh:/entrypoint/ollama-entrypoint.sh:ro

  ai-observability:
    build:
      context: ./ai-observability
      dockerfile: Dockerfile
    container_name: payment-ai-observability
    environment:
      LOKI_URL: http://loki:3100
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:1b
    ports:
      - "8000:8000"
    depends_on:
      - loki
      - ollama

volumes:
  loki_data:
  promtail_positions:
  grafana_data:
  ollama_data:
